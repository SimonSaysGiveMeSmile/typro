name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: |
          swift build -c release --product Typro
          swift build -c release --product typro-fix

      - name: Package artifacts
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p Typro.app/Contents/MacOS Typro.app/Contents/Resources
          cp .build/release/Typro Typro.app/Contents/MacOS/
          cp AppIcon.icns Typro.app/Contents/Resources/
          cat > Typro.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Typro</string>
            <key>CFBundleIdentifier</key><string>com.typro.app</string>
            <key>CFBundleName</key><string>Typro</string>
            <key>CFBundleVersion</key><string>${VERSION#v}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION#v}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSUIElement</key><true/>
          </dict></plist>
          EOF
          zip -r Typro-${VERSION}.zip Typro.app
          mkdir -p dist && cp .build/release/typro-fix dist/ && cp install.sh dist/
          cd dist && zip -r ../typro-fix-${VERSION}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Typro-${{ github.ref_name }}.zip
            typro-fix-${{ github.ref_name }}.zip
          generate_release_notes: true
